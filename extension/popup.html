<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 18px;
      background: #0f172a;
      color: #e2e8f0;
    }
    h1 { font-size: 15px; font-weight: 600; color: #f8fafc; }
    .sub { font-size: 11px; color: #64748b; margin-bottom: 14px; }

    .live {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 12px; background: #1e293b; border-radius: 8px; margin-bottom: 10px;
      font-size: 12px; color: #cbd5e1;
    }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: #64748b; flex-shrink: 0; }
    .dot.capturing { background: #22c55e; box-shadow: 0 0 0 0 rgba(34,197,94,0.7); animation: pulse 1.6s infinite; }
    .dot.paused { background: #f59e0b; }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(34,197,94,0.6); }
      70% { box-shadow: 0 0 0 7px rgba(34,197,94,0); }
      100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
    }
    .live .mono { color: #f8fafc; font-variant-numeric: tabular-nums; }

    #stats {
      padding: 10px 12px; background: #1e293b; border-radius: 8px; margin-bottom: 12px;
      font-size: 12px; color: #94a3b8; line-height: 1.5;
    }
    #stats strong { color: #e2e8f0; }

    button {
      width: 100%; padding: 10px; border: none; border-radius: 6px; font-size: 13px;
      font-weight: 600; cursor: pointer; margin-top: 6px; transition: background 0.15s;
    }
    #summarizeBtn { background: #6366f1; color: white; }
    #summarizeBtn:hover { background: #4f46e5; }
    #summarizeBtn:disabled { background: #4b5563; cursor: not-allowed; }
    #dashboardBtn { background: #1e293b; color: #cbd5e1; border: 1px solid #334155; }
    #dashboardBtn:hover { background: #334155; }

    #status { margin-top: 12px; font-size: 12px; padding: 8px; border-radius: 6px; display: none; }
    #status.success { display: block; background: #064e3b; color: #6ee7b7; }
    #status.error { display: block; background: #450a0a; color: #fca5a5; }
    #status.loading { display: block; background: #1e1b4b; color: #a5b4fc; }

    .hint { font-size: 10px; color: #64748b; margin-top: 12px; text-align: center; }
    .hint a { color: #818cf8; }
  </style>
</head>
<body>
  <h1>Daily Mirror</h1>
  <div class="sub">A private, on-device look at your day.</div>

  <div class="live"><span id="dot" class="dot"></span><span id="liveText">Checking…</span></div>

  <div id="stats">Loading today…</div>

  <button id="summarizeBtn">✨ Summarize today</button>
  <button id="dashboardBtn">Open dashboard</button>

  <div id="status"></div>

  <div class="hint">Settings &amp; API key live in the <a href="#" id="dashLink">dashboard</a> · <a href="privacy.html" target="_blank">Privacy</a></div>

  <script type="module" src="popup.js"></script>
</body>
</html>
